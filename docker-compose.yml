services:
    redis:
        image: redis:7-alpine
        restart: unless-stopped
        command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
        volumes:
            - redis_data:/data
        networks:
            - internal

    api:
        build:
            context: .
            dockerfile: ./apps/api/Dockerfile
        restart: unless-stopped
        environment:
            - NODE_ENV=${NODE_ENV}
            - PORT=${API_PORT}
            - MONGODB_URI=${MONGODB_URI}
            - REDIS_URL=redis://redis:6379
            - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
            - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
            - WEB_URL=${WEB_URL}
            - PAY_PUBLIC_URL=${PAY_PUBLIC_URL}
            - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
            - RESEND_API_KEY=${RESEND_API_KEY}
            - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
            - WAYFORPAY_MERCHANT_ACCOUNT=${WAYFORPAY_MERCHANT_ACCOUNT}
            - WAYFORPAY_MERCHANT_SECRET_KEY=${WAYFORPAY_MERCHANT_SECRET_KEY}
            - WAYFORPAY_MERCHANT_DOMAIN=${WAYFORPAY_MERCHANT_DOMAIN}
            - PAYMENTS_SUBSCRIPTION_ENABLED=${PAYMENTS_SUBSCRIPTION_ENABLED}
            - PAYMENTS_ONE_OFF_ENABLED=${PAYMENTS_ONE_OFF_ENABLED}
            - AUTH_PASSWORD_MIN_LENGTH=${AUTH_PASSWORD_MIN_LENGTH}
            - AUTH_LOCKOUT_THRESHOLDS=${AUTH_LOCKOUT_THRESHOLDS}
            - AUTH_LOGIN_ATTEMPTS_TTL_MIN=${AUTH_LOGIN_ATTEMPTS_TTL_MIN}
            - AUTH_MAGIC_LINK_TTL_MIN=${AUTH_MAGIC_LINK_TTL_MIN}
            - AUTH_MAGIC_LINK_RATE_LIMIT=${AUTH_MAGIC_LINK_RATE_LIMIT}
            - AUTH_MAGIC_LINK_RATE_WINDOW_MIN=${AUTH_MAGIC_LINK_RATE_WINDOW_MIN}
            - AUTH_MAGIC_LINK_DEDUP_SEC=${AUTH_MAGIC_LINK_DEDUP_SEC}
            - ACCOUNT_DELETION_GRACE_DAYS=${ACCOUNT_DELETION_GRACE_DAYS}
            - ORPHAN_REMINDER_FIRST_DAYS=${ORPHAN_REMINDER_FIRST_DAYS}
            - ORPHAN_REMINDER_FINAL_DAYS=${ORPHAN_REMINDER_FINAL_DAYS}
            - ORPHAN_CLEANUP_DELETION_DAYS=${ORPHAN_CLEANUP_DELETION_DAYS}
            - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            - AI_CHAT_MAX_TOKENS=${AI_CHAT_MAX_TOKENS}
            - AI_CHAT_IP_LIMIT=${AI_CHAT_IP_LIMIT}
            - HELP_CHAT_MAX_TOKENS=${HELP_CHAT_MAX_TOKENS}
            - HELP_CHAT_IP_LIMIT=${HELP_CHAT_IP_LIMIT}
            - HELP_CHAT_DAILY_BUDGET=${HELP_CHAT_DAILY_BUDGET}
            - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
            - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
            - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
            - R2_BUCKET_NAME=${R2_BUCKET_NAME}
            - R2_PUBLIC_URL=${R2_PUBLIC_URL}
        depends_on:
            - redis
        networks:
            - internal

    # One-shot service РґР»СЏ DB-РјС–РіСЂР°С†С–Р№. РђРєС‚РёРІСѓС”С‚СЊСЃСЏ С‡РµСЂРµР·
    # `docker compose --profile migrations run --rm api-migrations` Сѓ CI
    # (deploy.yml) РїРµСЂРµРґ `docker compose up -d`. РџРѕР·Р° profile `migrations`
    # service РЅРµ СЃС‚Р°СЂС‚СѓС” СЂР°Р·РѕРј Р· API/Web вЂ” С‚РѕРјСѓ СЂРµРіСѓР»СЏСЂРЅРёР№ `up` РЅРµ С‚СЂРёРіРµСЂРёС‚СЊ
    # re-run. Env РЅР°Р±С–СЂ вЂ” С‚РѕР№ СЃР°РјРёР№, С‰Рѕ РІ `api`, Р°Р»Рµ РІРёСЂС–Р·Р°РЅРёР№ РґРѕ С‚РѕРіРѕ, С‰Рѕ
    # СЂРµР°Р»СЊРЅРѕ С‚СЂРµР±Р° РјС–РіСЂР°С†С–СЏРј (Mongo only). Р”С–Р»РёС‚СЊ network Р· `api`/`redis`,
    # Р±Рѕ MongoDB Atlas-URI Р№РґРµ РЅР°Р·РѕРІРЅС–; redis dependency РЅРµ РїРѕС‚СЂС–Р±РµРЅ.
    api-migrations:
        profiles: [migrations]
        build:
            context: .
            dockerfile: ./apps/api/Dockerfile
            target: migrations
        environment:
            - NODE_ENV=${NODE_ENV}
            - MONGODB_URI=${MONGODB_URI}
        networks:
            - internal

    web:
        build:
            context: .
            dockerfile: ./apps/web/Dockerfile
            args:
                API_INTERNAL_URL: http://api:${API_PORT}
                NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
                NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
                NEXT_PUBLIC_PAYMENTS_SUBSCRIPTION_ENABLED: ${NEXT_PUBLIC_PAYMENTS_SUBSCRIPTION_ENABLED}
                NEXT_PUBLIC_PAYMENTS_ONE_OFF_ENABLED: ${NEXT_PUBLIC_PAYMENTS_ONE_OFF_ENABLED}
                NEXT_PUBLIC_STORAGE_HOSTNAME: ${NEXT_PUBLIC_STORAGE_HOSTNAME}
                NEXT_PUBLIC_PAY_PUBLIC_URL: ${NEXT_PUBLIC_PAY_PUBLIC_URL}
        restart: unless-stopped
        environment:
            - NODE_ENV=${NODE_ENV}
            - PORT=${WEB_PORT}
            - API_INTERNAL_URL=http://api:${API_PORT}
            - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
            - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
            - NEXT_PUBLIC_STORAGE_HOSTNAME=${NEXT_PUBLIC_STORAGE_HOSTNAME}
            - NEXT_PUBLIC_PAY_PUBLIC_URL=${NEXT_PUBLIC_PAY_PUBLIC_URL}
        ports:
            - '127.0.0.1:${WEB_PORT}:${WEB_PORT}'
        depends_on:
            - api
        networks:
            - internal

networks:
    internal:
        driver: bridge

volumes:
    redis_data:
