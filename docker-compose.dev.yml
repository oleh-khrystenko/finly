services:
    redis:
        image: redis:7-alpine
        restart: unless-stopped
        ports:
            - '6379:6379'
        volumes:
            - redis_data_dev:/data

    api:
        image: node:20-alpine
        working_dir: /app
        command: >
            sh -c "corepack enable &&
            pnpm install --frozen-lockfile
            --filter ./apps/api...
            --filter ./packages/types... &&
            pnpm --filter ./packages/types build &&
            pnpm --filter ./apps/api dev"
        environment:
            - COREPACK_ENABLE_DOWNLOAD_PROMPT=0
            - PNPM_STORE_DIR=/pnpm-store
            - CI=true
            - NODE_ENV=development
            - PORT=${API_PORT}
            - MONGODB_URI=${MONGODB_URI}
            - REDIS_URL=redis://redis:6379
            - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
            - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
            - WEB_URL=http://localhost:${WEB_PORT}
            - PAY_PUBLIC_URL=http://pay.finly.local:${WEB_PORT}
            - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
            - RESEND_API_KEY=${RESEND_API_KEY}
            - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
            - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
            - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
            - PAYMENTS_SUBSCRIPTION_ENABLED=${PAYMENTS_SUBSCRIPTION_ENABLED}
            - PAYMENTS_ONE_OFF_ENABLED=${PAYMENTS_ONE_OFF_ENABLED}
            - AUTH_PASSWORD_MIN_LENGTH=${AUTH_PASSWORD_MIN_LENGTH}
            - AUTH_LOCKOUT_THRESHOLDS=${AUTH_LOCKOUT_THRESHOLDS}
            - AUTH_LOGIN_ATTEMPTS_TTL_MIN=${AUTH_LOGIN_ATTEMPTS_TTL_MIN}
            - AUTH_MAGIC_LINK_TTL_MIN=${AUTH_MAGIC_LINK_TTL_MIN}
            - AUTH_MAGIC_LINK_RATE_LIMIT=${AUTH_MAGIC_LINK_RATE_LIMIT}
            - AUTH_MAGIC_LINK_RATE_WINDOW_MIN=${AUTH_MAGIC_LINK_RATE_WINDOW_MIN}
            - AUTH_MAGIC_LINK_DEDUP_SEC=${AUTH_MAGIC_LINK_DEDUP_SEC}
            - ACCOUNT_DELETION_GRACE_DAYS=${ACCOUNT_DELETION_GRACE_DAYS}
            - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            - AI_CHAT_MAX_TOKENS=${AI_CHAT_MAX_TOKENS}
            - AI_CHAT_IP_LIMIT=${AI_CHAT_IP_LIMIT}
            - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
            - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
            - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
            - R2_BUCKET_NAME=${R2_BUCKET_NAME}
            - R2_PUBLIC_URL=${R2_PUBLIC_URL}
            - TSC_WATCHFILE=UsePolling
            - TSC_WATCHDIRECTORY=UsePolling
        ports:
            - '${API_PORT}:${API_PORT}'
        # Sprint 4 §4.0 — `host.docker.internal` alias для Linux у Режимі C
        # (API у dev compose, Mongo на host-machine з replica-set). На macOS/
        # Windows alias built-in у Docker Desktop і `host-gateway` — безпечний
        # noop. Без цього alias `MONGODB_URI=mongodb://host.docker.internal:...`
        # не резолвиться з api-контейнера на Linux і cascade-delete-флоу падає
        # з MongoServerSelectionError. Production-deploy ігнорує цей блок.
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        volumes:
            - ./:/app
            - pnpm-store:/pnpm-store
            - /app/node_modules
        depends_on:
            - redis

    web:
        image: node:20-alpine
        working_dir: /app
        command: >
            sh -c "corepack enable &&
            pnpm install --frozen-lockfile
            --filter ./apps/web...
            --filter ./packages/types... &&
            pnpm --filter ./packages/types build &&
            pnpm --filter ./apps/web dev"
        environment:
            - CI=true
            - NODE_ENV=development
            - NEXT_TELEMETRY_DISABLED=1
            - COREPACK_ENABLE_DOWNLOAD_PROMPT=0
            - PNPM_STORE_DIR=/pnpm-store
            - PORT=${WEB_PORT}
            - API_INTERNAL_URL=http://api:${API_PORT}
            - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL}
            - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT}/api
            - NEXT_PUBLIC_PAYMENTS_SUBSCRIPTION_ENABLED=${NEXT_PUBLIC_PAYMENTS_SUBSCRIPTION_ENABLED}
            - NEXT_PUBLIC_PAYMENTS_ONE_OFF_ENABLED=${NEXT_PUBLIC_PAYMENTS_ONE_OFF_ENABLED}
            - NEXT_PUBLIC_PAY_PUBLIC_URL=http://pay.finly.local:${WEB_PORT}
            - NEXT_PUBLIC_STORAGE_HOSTNAME=${NEXT_PUBLIC_STORAGE_HOSTNAME}
            - WATCHPACK_POLLING=true
            - CHOKIDAR_USEPOLLING=true
        ports:
            - '${WEB_PORT}:${WEB_PORT}'
        volumes:
            - ./:/app
            - pnpm-store:/pnpm-store
            - /app/node_modules
        depends_on:
            - api

volumes:
    redis_data_dev:
    pnpm-store:
